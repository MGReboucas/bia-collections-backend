services:
  - type: web
    name: curadobem-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: EMAIL_PROVIDER
        value: auto
      - key: EMAIL_FROM_NAME
        value: Bia Collections
      - key: ADMIN_ORDER_NOTIFICATION_EMAIL
        sync: false
      - key: EMAIL_LOGO_URL
        sync: false
      - key: STORE_NAME
        value: Bia Collections
      - key: STORE_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: REDIS_URL
        sync: false
      - key: EMAIL_QUEUE_BACKEND
        value: auto
      - key: EMAIL_QUEUE_NAME
        value: bia-email
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_API_URL
        value: https://api.resend.com/emails
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_API_URL
        value: https://api.brevo.com/v3/smtp/email
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_NOTIFICATION_URL
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: REQUIRE_MP_WEBHOOK_SECRET
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
